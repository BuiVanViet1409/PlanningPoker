<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planning Poker - Game Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <script src="/socket.io/socket.io.js"></script>
  <script>if(typeof io==='undefined'){var s=document.createElement('script');s.src='https://cdn.socket.io/4.7.5/socket.io.min.js';document.head.appendChild(s);}</script>
</head>
<body>
  <!-- Join Modal -->
  <div id="joinModal" class="modal-overlay">
    <div class="modal">
      <h2>Join Game</h2>
      <p id="modalGameName" class="modal-subtitle"></p>
      <div class="form-group">
        <label for="playerName">Your display name</label>
        <input type="text" id="playerName" placeholder="Enter your name" maxlength="30" autofocus>
      </div>
      <label class="slide-toggle">
        <input type="checkbox" id="spectatorCheck">
        <span class="slide-track"><span class="slide-thumb"></span></span>
        <span class="slide-text">Join as spectator <em>(watch only)</em></span>
      </label>
      <button id="joinBtn" class="btn-primary" disabled>Join game</button>
    </div>
  </div>

  <!-- Game Room -->
  <div id="gameRoom" class="game-room hidden">
    <!-- Header -->
    <header class="game-header">
      <a href="/" class="header-left header-home" title="Back to home">
        <div class="logo-icon-sm">&#9824;</div>
        <h1 id="gameName">Planning Poker</h1>
      </a>
      <div class="header-right" style="display:flex;align-items:center;gap:12px;">
        <label class="mode-switch" title="Toggle spectator mode">
          <input type="checkbox" id="spectatorToggle">
          <span class="switch-track">
            <span class="switch-thumb"></span>
          </span>
          <span class="switch-label" id="switchLabel">&#127918; Player</span>
        </label>
        <button id="inviteBtn" class="btn-outline-invite">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
          Invite players
        </button>
      </div>
    </header>

    <!-- Main Area -->
    <div class="game-main">
      <!-- Top Players -->
      <div id="topPlayers" class="player-row top-row"></div>

      <div class="middle-section">
        <!-- Left Players -->
        <div id="leftPlayers" class="player-col left-col"></div>

        <!-- Table -->
        <div class="poker-table">
          <div id="lonelySplash" class="lonely-splash hidden">
            <span class="lonely-emoji">&#128075;</span>
            <span class="lonely-text">Hey! Invite your team to get started</span>
            <a href="#" id="inviteLinkInner" class="lonely-link">&#128279; Copy invite link</a>
          </div>
          <div id="tableContent" class="table-content">
            <div id="tableStatus" class="table-status">Pick your cards!</div>
            <button id="revealBtn" class="btn-reveal hidden">&#127922; Reveal votes</button>
            <button id="resetBtn" class="btn-new-vote hidden">&#128260; New round</button>
          </div>
          <!-- Stats (shown after reveal) -->
          <div id="statsBar" class="stats-bar hidden">
            <div class="stat-item"><span class="stat-label">Average</span><span id="statAvg" class="stat-value">-</span></div>
            <div class="stat-item"><span class="stat-label">Min</span><span id="statMin" class="stat-value">-</span></div>
            <div class="stat-item"><span class="stat-label">Max</span><span id="statMax" class="stat-value">-</span></div>
          </div>
        </div>

        <!-- Right Players -->
        <div id="rightPlayers" class="player-col right-col"></div>
      </div>

      <!-- Bottom Players -->
      <div id="bottomPlayers" class="player-row bottom-row"></div>
    </div>

    <!-- Card Deck -->
    <div class="card-deck-area">
      <p class="deck-label">&#127183; Tap a card to vote</p>
      <div id="cardDeck" class="card-deck"></div>
    </div>
  </div>

  <!-- Emoji reaction popover -->
  <div id="reactionPopover" class="reaction-popover hidden">
    <button class="reaction-btn" data-emoji="\u{1F389}" title="Party">&#127881;</button>
    <button class="reaction-btn" data-emoji="\u{2764}\u{FE0F}" title="Heart">&#10084;&#65039;</button>
    <button class="reaction-btn" data-emoji="\u{1F44D}" title="Thumbs up">&#128077;</button>
    <button class="reaction-btn" data-emoji="\u{1F44F}" title="Clap">&#128079;</button>
    <button class="reaction-btn" data-emoji="\u{1F525}" title="Fire">&#128293;</button>
    <button class="reaction-btn" data-emoji="\u{1F680}" title="Rocket">&#128640;</button>
    <button class="reaction-btn" data-emoji="\u{1F602}" title="Laugh">&#128514;</button>
    <button class="reaction-btn" data-emoji="\u{1F92F}" title="Mind blown">&#129327;</button>
    <button class="reaction-btn" data-emoji="\u{1F440}" title="Eyes">&#128064;</button>
    <button class="reaction-btn" data-emoji="\u{1F4A9}" title="Poop">&#128169;</button>
    <button class="reaction-btn host-only" data-emoji="__host__" title="Make host">&#128081;</button>
  </div>

  <!-- Flying emoji container -->
  <div id="emojiFlyArea"></div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script>
    const gameId = window.location.pathname.split('/').pop();
    let socket = null;
    let myId = null;
    let selectedCard = null;
    let gameCards = [];
    let isRevealed = false;
    let isHost = false;

    // Elements
    const joinModal = document.getElementById('joinModal');
    const gameRoom = document.getElementById('gameRoom');
    const playerNameInput = document.getElementById('playerName');
    const joinBtn = document.getElementById('joinBtn');
    const modalGameName = document.getElementById('modalGameName');
    const gameNameEl = document.getElementById('gameName');
    const tableStatus = document.getElementById('tableStatus');
    const revealBtn = document.getElementById('revealBtn');
    const resetBtn = document.getElementById('resetBtn');
    const cardDeck = document.getElementById('cardDeck');
    const inviteBtn = document.getElementById('inviteBtn');
    const inviteLinkInner = document.getElementById('inviteLinkInner');
    const lonelySplash = document.getElementById('lonelySplash');
    const statsBar = document.getElementById('statsBar');

    // Start socket connection IMMEDIATELY (before user enters name) - reduces perceived latency
    function initSocket() {
      if (typeof io === 'undefined') {
        // socket.io client still loading (CDN fallback), retry shortly
        setTimeout(initSocket, 80);
        return;
      }
      socket = io({ transports: ['websocket', 'polling'] });
      socket.on('connect', () => { myId = socket.id; });
      socket.on('game-state', (state) => {
        if (!gameCards.length && state.cards) gameCards = state.cards;
        renderState(state);
      });
      socket.on('game-info', (info) => {
        gameNameEl.textContent = info.name;
        modalGameName.textContent = info.name;
        document.title = 'Planning Poker - ' + info.name;
        gameCards = info.cards;
      });
      socket.on('error-msg', (msg) => {
        alert(msg);
        window.location.href = '/';
      });
      // Ask server for game info right away so UI can render
      socket.emit('get-game-info', { gameId });
    }
    initSocket();

    // Prefill saved name from localStorage for instant re-join
    try {
      const savedName = localStorage.getItem('pp_playerName');
      if (savedName) {
        playerNameInput.value = savedName;
        joinBtn.disabled = false;
      }
    } catch {}

    // Join
    playerNameInput.addEventListener('input', () => {
      joinBtn.disabled = !playerNameInput.value.trim();
    });

    playerNameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !joinBtn.disabled) joinBtn.click();
    });

    let amSpectator = false;

    joinBtn.addEventListener('click', () => {
      const name = playerNameInput.value.trim();
      if (!name) return;

      amSpectator = document.getElementById('spectatorCheck').checked;

      try { localStorage.setItem('pp_playerName', name); } catch {}

      const payload = { gameId, playerName: name, isSpectator: amSpectator };

      // Socket already connected - just emit join
      if (socket && socket.connected) {
        socket.emit('join-game', payload);
      } else {
        const tryJoin = () => {
          if (socket && socket.connected) socket.emit('join-game', payload);
          else setTimeout(tryJoin, 50);
        };
        tryJoin();
      }

      joinModal.classList.add('hidden');
      gameRoom.classList.remove('hidden');

      // Sync toggle state
      document.getElementById('spectatorToggle').checked = amSpectator;
      updateSpectatorUI();
      renderCards();
    });

    function updateSpectatorUI() {
      const deck = document.querySelector('.card-deck-area');
      const label = document.getElementById('switchLabel');
      if (amSpectator) {
        deck.classList.add('hidden');
        label.innerHTML = '\u{1F441}\u{FE0F} Spectator';
      } else {
        deck.classList.remove('hidden');
        label.innerHTML = '\u{1F3AE} Player';
      }
    }

    // Spectator mode toggle (live switch)
    document.getElementById('spectatorToggle').addEventListener('change', (e) => {
      amSpectator = e.target.checked;
      // Clear current vote when switching to spectator
      if (amSpectator && selectedCard) {
        selectedCard = null;
        updateCardSelection();
      }
      if (socket && socket.connected) {
        socket.emit('set-spectator', { isSpectator: amSpectator });
      }
      updateSpectatorUI();
    });

    // Render cards
    function renderCards() {
      cardDeck.innerHTML = '';
      gameCards.forEach(card => {
        const el = document.createElement('button');
        el.className = 'poker-card';
        el.dataset.value = card;
        // Center number as main content
        const numSpan = document.createElement('span');
        numSpan.className = 'card-number';
        numSpan.textContent = card;
        el.appendChild(numSpan);
        el.addEventListener('click', () => {
          if (isRevealed) return;
          if (selectedCard === card) {
            selectedCard = null;
            socket.emit('vote', { vote: null });
          } else {
            selectedCard = card;
            socket.emit('vote', { vote: card });
          }
          updateCardSelection();
        });
        cardDeck.appendChild(el);
      });
    }

    function updateCardSelection() {
      document.querySelectorAll('.poker-card').forEach(el => {
        el.classList.toggle('selected', el.dataset.value === selectedCard);
      });
    }

    // Distribute players around the table
    function distributePlayersAroundTable(players) {
      const top = [], bottom = [], left = [], right = [];
      const count = players.length;

      if (count <= 2) {
        // 1-2 players: all on bottom
        players.forEach(p => bottom.push(p));
      } else if (count <= 4) {
        // 3-4: top and bottom
        const half = Math.ceil(count / 2);
        players.slice(0, half).forEach(p => top.push(p));
        players.slice(half).forEach(p => bottom.push(p));
      } else {
        // 5+: distribute around
        const perSide = Math.ceil(count / 4);
        players.forEach((p, i) => {
          const side = i % 4;
          if (side === 0) top.push(p);
          else if (side === 1) right.push(p);
          else if (side === 2) bottom.push(p);
          else left.push(p);
        });
      }

      return { top, bottom, left, right };
    }

    function createPlayerSeat(p, revealed, position) {
      const div = document.createElement('div');
      div.className = 'player-seat ' + position;
      if (p.isSpectator) div.classList.add('is-spectator');

      // Click other players to open reaction popover
      if (p.id !== myId) {
        div.classList.add('clickable');
        div.addEventListener('click', (e) => {
          e.stopPropagation();
          openReactionPopover(p, div);
        });
      }
      div.dataset.playerId = p.id;

      const cardDiv = document.createElement('div');
      cardDiv.className = 'player-vote-card';

      if (p.isSpectator) {
        cardDiv.classList.add('spectator');
        cardDiv.innerHTML = '&#128065;';
      } else if (revealed && p.vote !== null) {
        cardDiv.classList.add('revealed');
        cardDiv.textContent = p.vote;
      } else if (p.hasVoted) {
        cardDiv.classList.add('face-down');
      } else {
        cardDiv.classList.add('no-vote');
      }

      const nameDiv = document.createElement('div');
      nameDiv.className = 'player-label';
      nameDiv.textContent = p.name;
      if (p.id === myId) nameDiv.classList.add('is-me');
      if (p.isHost) {
        const crown = document.createElement('span');
        crown.className = 'host-badge';
        crown.textContent = ' (host)';
        nameDiv.appendChild(crown);
      }

      if (position === 'top') {
        div.appendChild(nameDiv);
        div.appendChild(cardDiv);
      } else {
        div.appendChild(cardDiv);
        div.appendChild(nameDiv);
      }

      return div;
    }

    // Render game state
    function renderState(state) {
      gameNameEl.textContent = state.gameName;
      isRevealed = state.revealed;
      isHost = state.isHost;

      const players = state.players;

      // Show lonely message if alone
      if (players.length <= 1) {
        lonelySplash.classList.remove('hidden');
      } else {
        lonelySplash.classList.add('hidden');
      }

      // Distribute players
      const { top, bottom, left, right } = distributePlayersAroundTable(players);

      document.getElementById('topPlayers').innerHTML = '';
      document.getElementById('bottomPlayers').innerHTML = '';
      document.getElementById('leftPlayers').innerHTML = '';
      document.getElementById('rightPlayers').innerHTML = '';

      top.forEach(p => document.getElementById('topPlayers').appendChild(createPlayerSeat(p, state.revealed, 'top')));
      bottom.forEach(p => document.getElementById('bottomPlayers').appendChild(createPlayerSeat(p, state.revealed, 'bottom')));
      left.forEach(p => document.getElementById('leftPlayers').appendChild(createPlayerSeat(p, state.revealed, 'left')));
      right.forEach(p => document.getElementById('rightPlayers').appendChild(createPlayerSeat(p, state.revealed, 'right')));

      // Table status (spectators don't count)
      const voters = players.filter(p => !p.isSpectator);
      const votedCount = voters.filter(p => p.hasVoted).length;
      const totalCount = voters.length;

      if (state.revealed) {
        tableStatus.innerHTML = state.stats && state.stats.consensus
          ? '\u2705 Consensus! Great teamwork!'
          : '\u2728 Votes are in! Let\u2019s discuss';
        revealBtn.classList.add('hidden');
        resetBtn.classList.remove('hidden');
        cardDeck.classList.add('disabled');

        // Only host sees reset button
        if (!state.isHost) resetBtn.classList.add('hidden');

        // Stats
        if (state.stats) {
          statsBar.classList.remove('hidden');
          document.getElementById('statAvg').textContent = state.stats.average;
          document.getElementById('statMin').textContent = state.stats.min;
          document.getElementById('statMax').textContent = state.stats.max;
        }
      } else {
        statsBar.classList.add('hidden');
        resetBtn.classList.add('hidden');
        cardDeck.classList.remove('disabled');

        if (totalCount === 0) {
          tableStatus.innerHTML = '\u{1F440} Only spectators here \u2014 waiting for voters...';
          revealBtn.classList.add('hidden');
        } else if (votedCount === totalCount && totalCount > 0) {
          tableStatus.innerHTML = state.isHost
            ? '\u{1F389} Everyone voted! Click to reveal'
            : '\u{1F389} Everyone voted! Waiting for host to reveal...';
          if (state.isHost) revealBtn.classList.remove('hidden');
          else revealBtn.classList.add('hidden');
        } else if (votedCount > 0) {
          tableStatus.innerHTML = '\u{1F4AD} ' + votedCount + ' of ' + totalCount + ' voted \u2014 waiting for others...';
          if (state.isHost) revealBtn.classList.remove('hidden');
          else revealBtn.classList.add('hidden');
        } else {
          tableStatus.innerHTML = '\u{1F3B4} Pick a card below to vote!';
          revealBtn.classList.add('hidden');
        }
      }
    }

    // Actions
    revealBtn.addEventListener('click', () => socket.emit('reveal'));
    resetBtn.addEventListener('click', () => {
      selectedCard = null;
      updateCardSelection();
      socket.emit('reset');
    });

    function copyInviteLink() {
      const url = window.location.href;
      navigator.clipboard.writeText(url).then(() => {
        showToast('Link copied to clipboard!');
      }).catch(() => {
        prompt('Share this link:', url);
      });
    }

    inviteBtn.addEventListener('click', copyInviteLink);
    inviteLinkInner.addEventListener('click', (e) => {
      e.preventDefault();
      copyInviteLink();
    });

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 2500);
    }

    /* ====== REACTION POPOVER & FLYING EMOJIS ====== */
    const reactionPopover = document.getElementById('reactionPopover');
    let reactionTargetId = null;

    function openReactionPopover(player, seatEl) {
      reactionTargetId = player.id;
      // Show/hide host transfer option
      const hostBtn = reactionPopover.querySelector('.host-only');
      if (hostBtn) hostBtn.style.display = (isHost && !player.isHost) ? '' : 'none';

      const rect = seatEl.getBoundingClientRect();
      reactionPopover.classList.remove('hidden');
      // Position above the player
      const popRect = reactionPopover.getBoundingClientRect();
      let left = rect.left + rect.width / 2 - popRect.width / 2;
      let top = rect.top - popRect.height - 12;
      // Clamp to viewport
      left = Math.max(8, Math.min(window.innerWidth - popRect.width - 8, left));
      if (top < 8) top = rect.bottom + 12;
      reactionPopover.style.left = left + 'px';
      reactionPopover.style.top = top + 'px';
    }

    function closeReactionPopover() {
      reactionPopover.classList.add('hidden');
      reactionTargetId = null;
    }

    document.addEventListener('click', (e) => {
      if (!reactionPopover.contains(e.target) && !e.target.closest('.player-seat')) {
        closeReactionPopover();
      }
    });

    reactionPopover.addEventListener('click', (e) => {
      const btn = e.target.closest('.reaction-btn');
      if (!btn || !reactionTargetId) return;
      const emoji = btn.dataset.emoji;
      if (emoji === '__host__') {
        if (confirm('Transfer host to this player?')) {
          socket.emit('transfer-host', { targetId: reactionTargetId });
        }
      } else {
        socket.emit('reaction', { targetId: reactionTargetId, emoji });
      }
      closeReactionPopover();
    });

    // Receive reactions
    if (typeof io !== 'undefined') {
      // socket listeners added below after socket init, use a queue approach
    }

    function flyEmoji(fromId, toId, emoji) {
      const fromEl = document.querySelector('.player-seat[data-player-id="' + fromId + '"]');
      const toEl = document.querySelector('.player-seat[data-player-id="' + toId + '"]');
      if (!toEl) return;
      const fromRect = fromEl ? fromEl.getBoundingClientRect() : { left: window.innerWidth/2, top: window.innerHeight - 100, width: 0, height: 0 };
      const toRect = toEl.getBoundingClientRect();
      const startX = fromRect.left + fromRect.width / 2;
      const startY = fromRect.top + fromRect.height / 2;
      const endX = toRect.left + toRect.width / 2;
      const endY = toRect.top + toRect.height / 2;

      const el = document.createElement('div');
      el.className = 'flying-emoji';
      el.textContent = emoji;
      el.style.left = startX + 'px';
      el.style.top = startY + 'px';
      el.style.setProperty('--dx', (endX - startX) + 'px');
      el.style.setProperty('--dy', (endY - startY) + 'px');
      document.getElementById('emojiFlyArea').appendChild(el);

      // After flying animation, burst at target
      setTimeout(() => {
        el.classList.add('burst');
        // Spawn 6 mini emojis burst from target
        for (let i = 0; i < 6; i++) {
          const b = document.createElement('div');
          b.className = 'burst-emoji';
          b.textContent = emoji;
          b.style.left = endX + 'px';
          b.style.top = endY + 'px';
          const angle = (Math.PI * 2 * i) / 6 + Math.random() * 0.5;
          const dist = 50 + Math.random() * 40;
          b.style.setProperty('--bx', Math.cos(angle) * dist + 'px');
          b.style.setProperty('--by', Math.sin(angle) * dist + 'px');
          document.getElementById('emojiFlyArea').appendChild(b);
          setTimeout(() => b.remove(), 900);
        }
      }, 650);

      setTimeout(() => el.remove(), 1200);
    }

    // Attach socket listener for reactions once socket is ready
    const attachReaction = setInterval(() => {
      if (socket && socket.on) {
        socket.on('reaction', ({ fromId, toId, emoji }) => flyEmoji(fromId, toId, emoji));
        clearInterval(attachReaction);
      }
    }, 100);
  </script>
</body>
</html>
